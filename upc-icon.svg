<svg xmlns="http://www.w3.org/2000/svg" width="150" height="100" viewBox="0 0 150 100">
  <!-- Background -->
  <rect width="100%" height="100%" fill="#ffffff"/>
  
  <!-- Barcode Pattern (Using standard vector lines) -->
  <g fill="#000000">
    <!-- Guard bars (Left) -->
    <rect x="10" y="10" width="2" height="70"/>
    <rect x="14" y="10" width="2" height="70"/>
    
    <!-- Data bars payload group -->
    <rect x="20" y="10" width="4" height="60"/>
    <rect x="26" y="10" width="2" height="60"/>
    <rect x="30" y="10" width="6" height="60"/>
    <rect x="40" y="10" width="2" height="60"/>
    <rect x="46" y="10" width="4" height="60"/>
    <rect x="54" y="10" width="6" height="60"/>
    <rect x="62" y="10" width="2" height="60"/>
    <rect x="68" y="10" width="4" height="60"/>
    
    <!-- Center guard bars -->
    <rect x="74" y="10" width="2" height="70"/>
    <rect x="78" y="10" width="2" height="70"/>
    
    <!-- Data bars payload group -->
    <rect x="84" y="10" width="4" height="60"/>
    <rect x="90" y="10" width="6" height="60"/>
    <rect x="98" y="10" width="2" height="60"/>
    <rect x="104" y="10" width="4" height="60"/>
    <rect x="110" y="10" width="6" height="60"/>
    <rect x="120" y="10" width="2" height="60"/>
    <rect x="124" y="10" width="4" height="60"/>
    <rect x="132" y="10" width="2" height="60"/>
    
    <!-- Guard bars (Right) -->
    <rect x="138" y="10" width="2" height="70"/>
    <rect x="142" y="10" width="2" height="70"/>
  </g>
  
  <!-- Human Readable Text Layout -->
  <text x="75" y="88" font-family="monospace" font-size="14" text-anchor="middle" letter-spacing="4" fill="#000000">1234567890</text>
</svg>
