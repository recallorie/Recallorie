<!DOCTYPE html>
<html>
<head>
    <meta charset="utf-8">
    <title>Redirecting...</title>
    <!-- Instant fallback script if the browser doesn't execute JS immediately -->
    <meta http-equiv="refresh" content="0;url=./Recallorie/Recallorie.html">
</head>
<body>
    <script>
        // Smoothly forwards the user to the inner application page
        window.location.href = "./Recallorie/Recallorie.html";
    </script>
    <p>Redirecting you to the application... if it doesn't load, <a href="./Recallorie/Recallorie.html">click here</a>.</p>
</body>
</html>
